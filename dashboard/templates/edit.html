{% extends "base.html" %}
{% block content %}
<div style="max-width:720px; margin:0 auto">
  <a href="/" class="btn btn-neutral btn-sm" style="margin-bottom:20px; display:inline-flex">← Voltar</a>
  <h2 class="section-title">✎ Editar Conteúdo</h2>

  {% if item.image_path %}
  <img src="/image/{{ item.id }}"
       style="width:100%;max-height:420px;object-fit:contain;border-radius:14px;
              background:var(--surface2);margin-bottom:20px;display:block">
  {% endif %}

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px">
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px">
      <strong style="color:var(--text)">{{ item.title }}</strong><br>
      Tipo: {{ item.type }} · Plataforma: {{ item.platform }} · Liga: {{ item.league or '—' }}
    </p>

    <form method="post" action="/edit/{{ item.id }}">
      <label style="font-size:0.85rem;color:var(--muted);display:block;margin-bottom:8px">
        Legenda / Texto gerado pela IA
      </label>
      <textarea name="generated_text"
                style="width:100%;height:320px;
                       background:var(--bg);color:var(--text);
                       border:1px solid var(--border);border-radius:10px;
                       padding:14px;font-size:0.9rem;resize:vertical;
                       font-family:inherit;line-height:1.6;outline:none">{{ item.generated_text or '' }}</textarea>
      <div style="display:flex;gap:12px;margin-top:16px">
        <button type="submit" class="btn btn-approve">💾 Salvar</button>
        <a href="/" class="btn btn-neutral">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
