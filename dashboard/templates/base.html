<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esportes Mundo — Painel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090912;
    --surface: #13131f;
    --surface2: #1c1c2e;
    --accent: #ff4b0f;
    --accent2: #ff8c42;
    --text: #f0f0f8;
    --muted: #8888aa;
    --border: #2a2a40;
    --green: #4caf50;
    --red: #f44336;
    --yellow: #ff9800;
    --purple: #9c27b0;
    --blue: #2196f3;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .navbar {
    background: var(--surface);
    border-bottom: 3px solid var(--accent);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .navbar .logo { font-size: 1.25rem; font-weight: 800; color: var(--text); }
  .navbar .logo span { color: var(--accent); }
  .navbar nav { display: flex; gap: 16px; margin-left: auto; }
  .navbar nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color .2s; }
  .navbar nav a:hover, .navbar nav a.active { color: var(--accent); }

  .container { max-width: 1440px; margin: 0 auto; padding: 28px 24px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 0.875rem; font-weight: 600;
    text-decoration: none; transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .btn-accent   { background: var(--accent); color: white; }
  .btn-approve  { background: var(--green); color: white; }
  .btn-reject   { background: var(--red); color: white; }
  .btn-edit     { background: var(--yellow); color: #111; }
  .btn-regen    { background: var(--purple); color: white; }
  .btn-neutral  { background: var(--surface2); color: var(--text); }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-type    { background: #1e1e35; color: #9090cc; }
  .badge-live    { background: #2a1010; color: #ff4b4b; }
  .badge-finished{ background: #1a2a1a; color: var(--green); }
  .badge-sched   { background: #1a1a2a; color: #6699cc; }
  .badge-league  { background: #1e2a1e; color: #88cc88; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color .2s;
  }
  .card:hover { border-color: #3a3a5a; }

  .section-title {
    font-size: 1.1rem; font-weight: 700; color: var(--accent);
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .section-title .count {
    background: var(--accent); color: white;
    border-radius: 20px; padding: 2px 10px; font-size: 0.8rem;
  }

  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1.1rem; }

  @media (max-width: 600px) {
    .navbar { padding: 12px 16px; }
    .container { padding: 16px; }
  }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <div class="logo">⚽ Esportes Mundo <span>@esportes.mundo_</span></div>
  <nav>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Fila</a>
    <a href="/history" {% if request.url.path == "/history" %}class="active"{% endif %}>Histórico</a>
    <a href="/fetch" class="btn btn-accent btn-sm">🔄 Buscar Agora</a>
  </nav>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
